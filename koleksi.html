<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Koleksi Batik</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#faf8f4;
    font-family:Segoe UI,sans-serif;
}

.card{
    border:none;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    height:300px;
    object-fit:cover;
}

.price{
    color:#b67b1f;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container py-5">

<h1 class="text-center mb-5">Koleksi Batik Indonesia</h1>

<div class="row g-4">

<div class="col-md-4">

<a href="https://t.me/jumatberkah?text=Saya%20ingin%20pesan%20Batik%20Anggun" class="text-decoration-none text-dark" target="_blank">

<div class="card">

<img src="images/parang.jpg">

<div class="card-body">

<h4>Batik Anggun</h4>

<p class="price">Rp250.000</p>

</div>

</div>

</a>

</div>

<div class="col-md-4">

<a href="https://t.me/jumatberkah?text=Saya%20ingin%20pesan%20Batik%20Kirana" class="text-decoration-none text-dark" target="_blank">

<div class="card">

<img src="images/kawung.jpg">

<div class="card-body">

<h4>Batik Kirana</h4>

<p class="price">Rp240.000</p>

</div>

</div>

</a>

</div>

<div class="col-md-4">

<a href="https://t.me/jumatberkah?text=Saya%20ingin%20pesan%20Batik%20Laras" class="text-decoration-none text-dark" target="_blank">

<div class="card">

<img src="images/truntum.jpg">

<div class="card-body">

<h4>Batik Laras</h4>

<p class="price">Rp260.000</p>

</div>

</div>

</a>

</div>

</div>

<div class="text-center mt-5">

<a href="index.html" class="btn btn-warning">
← Kembali ke Beranda
</a>

</div>

</div>

</html>
